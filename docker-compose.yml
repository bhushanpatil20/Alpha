version: "3.9"

services:

  backend:
    build: ./backend
    container_name: alpha-backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build: ./frontend
    container_name: alpha-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped